<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-page light-mode">

<div class="page-controls">
    <a href="index.html#projects" class="page-home-btn">
        <i class="fas fa-arrow-left"></i>
        Home
    </a>

    <button
        id="projectThemeToggle"
        class="page-theme-toggle"
        type="button"
        aria-label="Switch to dark mode">
        <i class="fas fa-moon"></i>
    </button>
</div>

<main id="projectDetails"></main>

<script>
    (function () {
        const toggle = document.getElementById("projectThemeToggle");

        function applyProjectTheme(theme) {
            const isDark = theme === "dark";

            document.body.classList.toggle("light-mode", !isDark);
            document.body.classList.toggle("dark-mode", isDark);

            if (!toggle) return;

            toggle.innerHTML = isDark
                ? '<i class="fas fa-sun"></i>'
                : '<i class="fas fa-moon"></i>';

            toggle.setAttribute(
                "aria-label",
                isDark ? "Switch to light mode" : "Switch to dark mode"
            );
        }

        applyProjectTheme("light");

        if (toggle) {
            toggle.addEventListener("click", () => {
                const nextTheme =
                    document.body.classList.contains("dark-mode")
                        ? "light"
                        : "dark";

                applyProjectTheme(nextTheme);
            });
        }
    })();
</script>

<script type="module" src="project.js"></script>

</body>
</html>
