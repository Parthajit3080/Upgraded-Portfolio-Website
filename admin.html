.gallery-admin-card{

    background:#111;

    border:1px solid #333;

    border-radius:14px;

    padding:18px;

    transition:0.25s ease;
}

.gallery-admin-card h3{

    font-size:18px;

    margin-bottom:10px;

    line-height:1.3;
}

.gallery-meta{

    font-size:12px;

    color:#aaa;

    margin-bottom:12px;
}

.gallery-desc{

    font-size:13px;

    line-height:1.5;

    color:#d0d0d0;

    margin-bottom:14px;
}

.gallery-image-count{

    font-size:13px;

    color:#60a5fa;

    font-weight:600;

    margin-bottom:14px;
}
</style>
</head>












<body>
    <div class="admin-container">

        <h2 id="adminLoginTitle">Admin Login</h2>

        <div id="loginSection">
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPassword" placeholder="Password">
            <button id="loginBtn">Login</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <h1>Welcome Parthajit</h1>
            <button id="logoutBtn">Logout</button>

            <!-- ========================= -->
            <!-- 📦 PROJECTS -->
            <!-- ========================= -->

            <div class="admin-card project-section">

                <h3 class="section-primary">Projects</h3>

                <!-- ADD PROJECT -->
                <div class="project-form">
                    <input type="text" id="projectTitle" placeholder="Project Title">
                    <input type="text" id="shortDesc" placeholder="Short Description (for preview)">
                    
                    <textarea id="projectFullDesc" placeholder="Full Description"></textarea>

                    <input type="text" id="projectTechStack" placeholder="Tech Stack (comma separated)">
                    <input type="text" id="projectDataset" placeholder="Dataset (optional)">

                    <input type="text" id="projectGithub" placeholder="GitHub Link">
                    <input type="text" id="projectPaper" placeholder="Research Paper Link (optional)">

                    <input type="text" id="projectScreenshots" placeholder="Screenshot filenames (comma separated)">
                    <input type="text" id="projectFileName" placeholder="Preview File Name">

                    <button id="addProjectBtn" class="admin-btn">Add Project</button>
                </div>

                <!-- EXISTING PROJECTS -->
                <h3 class="section-secondary">Existing Projects</h3>
                <div id="adminProjectsContainer"></div>

            </div>


            <!-- ========================= -->
            <!-- 📜 CERTIFICATES -->
            <!-- ========================= -->

           <div class="admin-card certificate-section">

            <h3 class="section-primary">Certificates</h3>

            <!-- ADD CERTIFICATE FORM -->
            <div class="cert-form">
                <input type="text" id="certTitle" placeholder="Certificate Title">
                <input type="text" id="certIssuer" placeholder="Issued By">
                <input type="text" id="certFileName" placeholder="File name (example: isi_cert.pdf)">
                <button id="addCertBtn" class="admin-btn">Add Certificate</button>
            </div>

            <!-- EXISTING CERTIFICATES -->
            <h3 class="section-secondary">Existing Certificates</h3>
            <div id="adminCertificatesContainer"></div>

        </div>


            <!-- ========================= -->
            <!-- 🧠 SKILLS -->
            <!-- ========================= -->

           <div class="admin-card skill-section">

                <h3 class="section-primary">Skills</h3>

                <!-- ADD SKILL -->
                <div class="skill-form">
                    <input type="text" id="skillName" placeholder="Skill Name">
                    <input type="text" id="skillIcon" placeholder="Icon (emoji like 🚀)">
                    <button id="addSkillBtn" class="admin-btn">Add Skill</button>
                </div>

                <!-- EXISTING SKILLS -->
                <h3 class="section-secondary">Existing Skills</h3>
                <div id="adminSkillsContainer"></div>

            </div>


            <!-- ========================= -->
            <!-- 🏆 ACHIEVEMENTS -->
            <!-- ========================= -->

            <div class="admin-card">

                <h3 class="section-primary">Add Achievement</h3>

                <div class="admin-grid">

                    <!-- EMOJI PICKER -->
                    <div class="emoji-picker" id="achievementIconPicker">
                        <span data-icon="🏆">🏆</span>
                        <span data-icon="🎖️">🎖️</span>
                        <span data-icon="🥇">🥇</span>
                        <span data-icon="🚀">🚀</span>
                        <span data-icon="⭐">⭐</span>
                        <span data-icon="🏅">🏅</span>
                        <span data-icon="🎯">🎯</span>
                        <span data-icon="📜">📜</span>
                        <span data-icon="🔥">🔥</span>
                        <span data-icon="💡">💡</span>
                    </div>

                    <input type="hidden" id="achievementIcon">

                    <input type="text" id="achievementTitle" placeholder="Achievement Title">
                    <input type="text" id="achievementSubtitle" placeholder="Smaller Title">

                    <input type="text" id="achievementYear" placeholder="Year (optional)">

                    <textarea id="achievementDesc" placeholder="Short Description"></textarea>

                </div>

                <button id="addAchievementBtn" class="admin-btn">Add Achievement</button>

                <h3 class="section-secondary">Existing Achievements</h3>
                <div id="adminAchievementsContainer"></div>

            </div>

            
           <!-- ========================= -->
<!-- 🖼️ GALLERY -->
<!-- ========================= -->

<div class="admin-card gallery-section">

    <h3 class="section-primary">Gallery Events</h3>

    <!-- ADD GALLERY EVENT -->

    <form id="galleryForm" class="gallery-form admin-grid">

        <input
            type="text"
            id="galleryTitle"
            placeholder="Event Title">

        <input
            type="month"
            id="galleryDate">
        
        <input
            type="number"
            id="galleryOrder"
            placeholder="Display Order (10,20,30...)">

        <textarea
            id="galleryDescription"
            placeholder="Event Description">
        </textarea>

        <textarea
            id="galleryImages"
            placeholder="Image paths separated by commas&#10;&#10;Example:&#10;assets/gallery/event1/img1.jpg,&#10;assets/gallery/event1/img2.jpg">
        </textarea>

    

    <button
    type="submit"
    id="addGalleryBtn"
    class="admin-btn">

    Add Gallery Event

</button>

</form>



<!-- EXISTING EVENTS -->

<h3 class="section-secondary">
    Existing Gallery Events
</h3>

    <div id="galleryList"></div>

</div>



            <!-- ========================= -->
            <!-- 🔬 RESEARCH -->
            <!-- ========================= -->

            <div class="admin-card">

                <h3 class="section-primary">Add Research</h3>

                <div class="admin-grid">

                    <!-- EMOJI PICKER -->
                    <div class="emoji-picker" id="researchIconPicker">
                        <span data-icon="🔬">🔬</span>
                        <span data-icon="📄">📄</span>
                        <span data-icon="🧠">🧠</span>
                        <span data-icon="📊">📊</span>
                        <span data-icon="💻">💻</span>
                        <span data-icon="🛰️">🛰️</span>
                        <span data-icon="⚙️">⚙️</span>
                        <span data-icon="📚">📚</span>
                        <span data-icon="🌐">🌐</span>
                        <span data-icon="🔗">🔗</span>
                    </div>

                    <input type="hidden" id="researchIcon">

                    <input type="text" id="researchTitle" placeholder="Research Title">
                    <input type="text" id="researchSubtitle" placeholder="Smaller Title">

                    <input type="text" id="researchPaper" placeholder="Paper Link">
                    <input type="text" id="researchGithub" placeholder="GitHub Link">

                    <textarea id="researchDesc" placeholder="Description"></textarea>

                </div>

                <button id="addResearchBtn" class="admin-btn">Add Research</button>

                <h3 class="section-secondary">Existing Research</h3>
                <div id="adminResearchContainer"></div>

            </div>


            <!-- ========================= -->
            <!-- 📩 MESSAGES -->
            <!-- ========================= -->

            <h3 class="section-primary">Messages</h3>
            <div id="messagesContainer"></div>

        </div>

        <script type="module" src="admin.js"></script>

    </div>
</body>
